name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build typecheck test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Glofox SAFETY.md guard
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if echo "$changed" | grep -qx 'lib/glofox/client.ts'; then
            if ! echo "$changed" | grep -qx 'tests/glofox/SAFETY.md'; then
              echo "::error::lib/glofox/client.ts changed without updating tests/glofox/SAFETY.md."
              echo "Glofox is read-only — see tests/glofox/SAFETY.md for the audit log."
              echo "If you added a method, document it. If you added a write method, STOP."
              exit 1
            fi
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy_publishable_key
        run: npm run build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            export NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" ]; then
            export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=dummy_publishable_key
          fi
          npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
